{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>{% block page_title %}Dashboard{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            position: fixed;
            width: 230px;
        }

        .sidebar a {
            color: #c2c7d0;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
            color: white;
        }

        .content {
            margin-left: 230px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
            margin-left: 230px;
        }

        .brand {
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            text-align: center;
            background: #212529;
        }
    </style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <div class="brand">
        🚀 KRA CRM
    </div>

    <a href="{% url 'dashboard' %}">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="{% url 'employee_list' %}">
        <i class="fas fa-users"></i> Employees
    </a>

    <a href="{% url 'department_list' %}">
        <i class="fas fa-building"></i> Departments
    </a>

    <a href="{% url 'kra_categories' %}">
        <i class="fas fa-layer-group"></i> Categories
    </a>

    <a href="{% url 'kra_tasks' %}">
        <i class="fas fa-tasks"></i> Task Templates
    </a>

    <a href="{% url 'assign_task' %}">
        <i class="fas fa-plus-circle"></i> Assign Task
    </a>

    <a href="{% url 'all_tasks' %}">
        <i class="fas fa-list"></i> All Tasks
    </a>

    <a href="{% url 'logout' %}">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>

</div>

<!-- ================= TOPBAR ================= -->
<div class="topbar d-flex justify-content-between align-items-center">

    <!-- 🔥 FIXED: separate block -->
    <h5 class="mb-0">
        {% block header_title %}Dashboard{% endblock %}
    </h5>

    <div>
        Logged in as <strong>{{ request.user.username }}</strong>
    </div>

</div>

<!-- ================= CONTENT ================= -->
<div class="content">

    {% block content %}
    {% endblock %}

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
