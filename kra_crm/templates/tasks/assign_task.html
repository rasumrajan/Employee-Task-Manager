{% extends 'base.html' %}

{% block page_title %}
Assign Task
{% endblock %}

{% block content %}

<div class="card card-primary">
<div class="card-header">
    <h3 class="card-title">Assign New Task</h3>
</div>

<form method="post">
    {% csrf_token %}

    <div class="card-body">

        <div class="row">

            <!-- Employee -->
            <div class="col-md-6">
                <div class="form-group">
                    <label>Employee</label>
                    {{ form.employee }}
                </div>
            </div>

            <!-- Task -->
            <div class="col-md-6">
                <div class="form-group">
                    <label>Task</label>
                    {{ form.task }}
                </div>
            </div>

            <!-- Deadline -->
            <div class="col-md-6">
                <div class="form-group">
                    <label>Deadline</label>
                    {{ form.deadline }}
                </div>
            </div>

            <!-- Status -->
            <div class="col-md-6">
                <div class="form-group">
                    <label>Status</label>
                    {{ form.status }}
                </div>
            </div>

            <!-- Progress -->
            <div class="col-md-6">
                <div class="form-group">
                    <label>Progress (%)</label>
                    {{ form.progress }}
                </div>
            </div>

        </div>

    </div>

    <div class="card-footer text-right">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-check"></i> Assign Task
        </button>
    </div>

</form>

</div>

{% endblock %}
